workflows:
  android-workflow:
    name: Android APK Build
    instance_type: mac_mini_m1
    working_directory: frontend
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
    artifacts:
      - frontend/build/app/outputs/flutter-apk/*.apk
